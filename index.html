    const c1 = coordOf(sg.from), c2 = coordOf(sg.to);
    L.polyline([[c1[1], c1[0]], [c2[1], c2[0]]],
      { color: sg.sun > 0.5 ? "#e0a43b" : "#1f9d57", weight: 6, opacity: 1, lineCap: "round", lineJoin: "round" })
      .addTo(routeLayer);
  }
}

// ---------- Trip state ----------
let from = null, to = null;      // { label, latlng }
let searchTarget = "to";         // which end the search bar is editing
let routing = false;

const els = {
  top: document.getElementById("top"),
  bottom: document.getElementById("bottom"),
  searchBar: document.getElementById("searchBar"),
  tripBar: document.getElementById("tripBar"),
  q: document.getElementById("q"),
  qClear: document.getElementById("qClear"),
  sugg: document.getElementById("sugg"),
  toast: document.getElementById("toast"),
  routeCard: document.getElementById("routeCard"),
  donut: document.getElementById("donut"),
  donutPct: document.getElementById("donutPct"),
  routeMeta: document.getElementById("routeMeta"),
  fromLabel: document.getElementById("fromLabel"),
  toLabel: document.getElementById("toLabel"),
};

let toastTimer = null;
function toast(msg, sticky) {
  clearTimeout(toastTimer);
  if (!msg) { els.toast.hidden = true; return; }
  els.toast.textContent = msg;
  els.toast.hidden = false;
  layoutAttribution();
  if (!sticky) toastTimer = setTimeout(() => { els.toast.hidden = true; }, 5000);
}

const fmtKm = (m) => m < 1000 ? Math.round(m) + " m" : (m / 1000).toFixed(2).replace(".", ",") + " km";
const coordLabel = (ll) => `${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}`;

// ---------- Markers ----------
function pinIcon(letter, bg) {
  return L.divIcon({ className: "", iconSize: [26, 26], iconAnchor: [13, 13],
    html: `<div class="pin" style="background:${bg}"><span>${letter}</span></div>` });
}
function ensureMarker(kind, ll) {
  const isA = kind === "from";
  let m = isA ? markerA : markerB;
  if (m) { m.setLatLng(ll); return m; }
  m = L.marker(ll, { draggable: true, icon: pinIcon(isA ? "A" : "B", isA ? "#1f9d57" : "#e0a43b") }).addTo(map);
  m.on("dragend", () => {
    const p = m.getLatLng();
    const cur = isA ? from : to;
    setPoint(kind, p, cur && cur.pinned ? cur.label : "Punto en el mapa", false);
  });
  if (isA) markerA = m; else markerB = m;
  return m;
}

// `pinned` marks a label that came from a real place rather than from coordinates, so dragging
// a searched destination a few metres does not keep claiming it is still that address.
function setPoint(kind, latlng, label, fit) {
  const ll = L.latLng(latlng);
  ensureMarker(kind, ll);
  const entry = { label, latlng: ll, pinned: false };
  if (kind === "from") from = entry; else to = entry;
  // Whatever the search bar was open to ask has just been answered — by a map tap, a drag or a
  // suggestion. Leaving it open stacks it on top of the trip bar showing the same thing.
  if (searchTarget === kind) searchTarget = null;
  renderTrip();
  if (from && to) route(fit !== false);
  else if (kind === "to") map.setView(ll, Math.max(map.getZoom(), 16));
}

function clearPoint(kind) {
  if (kind === "from") { if (markerA) map.removeLayer(markerA); markerA = null; from = null; }
  else { if (markerB) map.removeLayer(markerB); markerB = null; to = null; }
  routeLayer.clearLayers();
  els.routeCard.hidden = true;
  renderTrip();
}

// ---------- Chrome ----------
function renderTrip() {
  const searching = !to || searchTarget !== null;
  els.tripBar.hidden = !to;
  els.searchBar.hidden = !!to && searchTarget === null;
  els.fromLabel.textContent = from ? from.label : "Elige el punto de partida";
  els.fromLabel.classList.toggle("empty", !from);
  els.toLabel.textContent = to ? to.label : "";
  els.q.placeholder = searchTarget === "from"
    ? "¿Desde dónde sales?" : "¿A dónde vas por la sombra?";
  els.qClear.hidden = !els.q.value;
  layoutAttribution();
}

function markStale() {
  if (!els.routeCard.hidden) els.routeCard.classList.add("pending");
}

function showRoute(r, sun) {
  const pct = Math.round(r.shadePct * 100);
  const min = Math.max(1, Math.round(r.length / 1.35 / 60));
  els.donut.style.background = `conic-gradient(var(--donut) ${(pct * 3.6).toFixed(0)}deg, rgba(255,255,255,.14) 0)`;
  els.donutPct.textContent = pct + "%";
  // The donut already carries the percentage, so the meta line does not repeat it — spelling it
  // out a second time wrapped the card onto two lines at phone width for no added information.
  els.routeMeta.textContent = `${fmtKm(r.length)} · ~${min} min a pie`;
  els.routeCard.hidden = false;
  els.routeCard.classList.remove("pending");
  layoutAttribution();
}

// Padding so fitBounds never tucks the route under a floating card.
const fitPad = () => ({
  paddingTopLeft: [28, els.top.offsetHeight + 24],
  paddingBottomRight: [28, els.bottom.offsetHeight + 24],
});

// ---------- Routing ----------
async function route(fit) {
  if (!from || !to || !G || routing) return;
  routing = true;
  markStale();
  try {
    toast("Calculando sombras…", true);
    await new Promise((r) => setTimeout(r, 0));
    const sun = renderShadows(bboxOf(from.latlng, to.latlng), false);

    const src = nearestNode(from.latlng), dst = nearestNode(to.latlng);
    if (src < 0 || dst < 0) throw new Error("Ese punto está fuera del mapa de València");
    toast("Buscando la ruta…", true);
    await new Promise((r) => setTimeout(r, 0));

    const r = dijkstra(src, dst, SHADE_ALPHA, sun.altitude);
    if (!r) throw new Error("No hay ruta — prueba con puntos más cerca de una calle");

    routeLayer.clearLayers();
    drawRoute(r);
    showRoute(r, sun);
    if (fit) map.fitBounds(routeLayer.getBounds(), fitPad());
    drawShadows(sun);
    toast(sun.altitude <= 0.03 ? "\u{1F319} El sol está bajo el horizonte — todo cuenta como sombra." : "");
  } catch (e) {
    els.routeCard.classList.remove("pending");
    toast("⚠️ " + e.message, true);
  } finally { routing = false; }
}

// The slider moved and settled: the shadiest route for the new sun is a different route, so it
// is recomputed rather than relabelled.
function onTimeSettled() {
  redrawShadows();
  if (from && to) route(false);
}

// ---------- Search ----------
let results = [], sel = -1;

function closeSugg() { els.sugg.hidden = true; els.sugg.innerHTML = ""; results = []; sel = -1; layoutAttribution(); }

function renderSugg() {
  els.sugg.innerHTML = "";
  if (!results.length) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = "Sin resultados en València";
    els.sugg.appendChild(li);
  } else {
    results.forEach((r, i) => {
      const li = document.createElement("li");
      li.className = i === sel ? "sel" : "";
      li.setAttribute("role", "option");
      li.innerHTML = `<span class="tile">◈</span><span class="txt"><span class="name"></span><span class="meta"></span></span>`;
      li.querySelector(".name").textContent = r.label;
      li.querySelector(".meta").textContent = r.hint || "";
      // mousedown, not click: blur would tear the list down before a click ever landed.
      li.addEventListener("mousedown", (e) => { e.preventDefault(); pick(i); });
      els.sugg.appendChild(li);
    });
  }
  els.sugg.hidden = false;
  layoutAttribution();
}

function pick(i) {
  const r = results[i];
  if (!r) return;
  const target = searchTarget || "to";
  els.q.blur();
  closeSugg();
  els.q.value = "";
  els.qClear.hidden = true;
  searchTarget = null;
  setPoint(target, [r.lat, r.lon], r.label, true);
  const entry = target === "from" ? from : to;
  if (entry) entry.pinned = true;
  renderTrip();
}

els.q.addEventListener("input", () => {
  els.qClear.hidden = !els.q.value;
  if (els.q.value.trim().length < 2) { closeSugg(); return; }
  results = geoSearch(els.q.value);
  sel = -1;
  renderSugg();
});
els.q.addEventListener("focus", () => { if (results.length) renderSugg(); });
els.q.addEventListener("blur", () => setTimeout(() => {
  if (els.sugg.hidden) return;
  closeSugg();
  // Opened only to edit an existing trip, then abandoned: put the trip bar back.
  if (to && searchTarget !== null) { searchTarget = null; renderTrip(); }
}, 140));
els.q.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { els.q.blur(); return; }
  if (els.sugg.hidden || !results.length) { if (e.key === "Enter") e.preventDefault(); return; }
  if (e.key === "ArrowDown" || e.key === "ArrowUp") {
    e.preventDefault();
    const dir = e.key === "ArrowDown" ? 1 : -1;
    sel = sel < 0 ? (dir > 0 ? 0 : results.length - 1) : (sel + dir + results.length) % results.length;
    renderSugg();
    const el = els.sugg.children[sel];
    if (el) el.scrollIntoView({ block: "nearest" });
  } else if (e.key === "Enter") {
    e.preventDefault();
    pick(sel < 0 ? 0 : sel);
  }
});
els.qClear.addEventListener("click", () => {
  els.q.value = "";
  els.qClear.hidden = true;
  closeSugg();
  els.q.focus();
});

// Tapping either end of the trip bar reopens the search against that end.
const openSearchFor = (kind) => {
  searchTarget = kind;
  renderTrip();
  els.q.value = "";
  els.qClear.hidden = true;
  els.q.focus();
};
document.getElementById("endFrom").onclick = () => openSearchFor("from");
document.getElementById("endTo").onclick = () => openSearchFor("to");

document.getElementById("swapBtn").onclick = (e) => {
  e.stopPropagation();
  if (!from || !to) return;
  const a = from, b = to;
  from = { ...b }; to = { ...a };
  ensureMarker("from", from.latlng);
  ensureMarker("to", to.latlng);
  renderTrip();
  route(true);
};
document.getElementById("clearBtn").onclick = (e) => {
  e.stopPropagation();
  clearPoint("to");
  searchTarget = "to";
  els.q.value = "";
  els.qClear.hidden = true;
  closeSugg();
  renderTrip();
};
document.getElementById("centerBtn").onclick = () => {
  if (routeLayer.getLayers().length) map.fitBounds(routeLayer.getBounds(), fitPad());
};

// ---------- Map interaction ----------
map.on("click", (e) => {
  const wrap = document.createElement("div");
  wrap.className = "pop";
  wrap.innerHTML = `<div class="plabel">Punto seleccionado</div>
    <div class="prow"><button class="a">Desde aquí</button><button class="b">Hasta aquí</button></div>`;
  const set = (kind) => { map.closePopup(); setPoint(kind, e.latlng, "Punto en el mapa", true); };
  wrap.querySelector("button.a").onclick = () => set("from");
  wrap.querySelector("button.b").onclick = () => set("to");
  L.popup({ closeButton: false, offset: [0, 4] }).setLatLng(e.latlng).setContent(wrap).openOn(map);
});

// The 2D fallback rebuilds shadow polygons for fresh territory, which is expensive enough to
// keep debounced until the map settles. The GPU layer follows `move` by itself.
if (!shadowLayer.gpu) {
  let moveTimer = null;
  map.on("moveend zoomend", () => {
    if (!G || !shadowLayer.isOn()) return;
    clearTimeout(moveTimer);
    moveTimer = setTimeout(() => {
      const b = map.getBounds();
      renderShadows([b.getWest(), b.getSouth(), b.getEast(), b.getNorth()], true);
    }, 200);
  });
}

// ---------- Layout ----------
// Attribution rides above the bottom stack. It is a licence condition, not decoration, so it
// must never end up under a card.
function layoutAttribution() {
  const el = document.querySelector(".leaflet-control-attribution");
  if (!el) return;
  // Only lift it where the cards actually reach across the bottom of the screen. On a wide
  // screen they are a left rail and the attribution keeps its corner.
  const overlaps = els.bottom.getBoundingClientRect().right > window.innerWidth - 260;
  el.style.bottom = overlaps ? (els.bottom.offsetHeight + 6) + "px" : "0px";
}
window.addEventListener("resize", layoutAttribution);

// ---------- Start ----------
// Geolocation is a convenience, never a requirement: denied, unavailable, or simply somewhere
// other than Valencia all land in the same place — pick a start yourself.
function locateOrigin() {
  if (!navigator.geolocation || from) return;
  navigator.geolocation.getCurrentPosition((pos) => {
    if (from) return;
    const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
    const bb = G && G.meta && G.meta.bbox;   // [s,w,n,e]
    if (bb && (ll.lat < bb[0] || ll.lat > bb[2] || ll.lng < bb[1] || ll.lng > bb[3])) return;
    setPoint("from", ll, "Tu ubicación", false);
    map.setView(ll, 16);
  }, () => {}, { enableHighAccuracy: false, timeout: 8000, maximumAge: 300000 });
}

setNow();
renderTrip();

loadArtifact().then(() => {
  toast("");
  // On the GPU path shade costs a fullscreen shader pass, so it is simply always on. The 2D
  // fallback needs one explicit first draw before its moveend handler takes over.
  if (shadowLayer.gpu) shadowLayer.redraw();
  else {
    const b = map.getBounds();
    renderShadows([b.getWest(), b.getSouth(), b.getEast(), b.getNorth()], true);
  }
  layoutAttribution();
  locateOrigin();
}).catch((e) => {
  toast("⚠️ No se han podido cargar los datos: " + e.message, true);
});
</script>
</body>
</html>
